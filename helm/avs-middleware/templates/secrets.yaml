apiVersion: v1
kind: Secret
metadata:
  name: {{ include "avs-middleware.fullname" . }}-secrets
  labels:
    {{- include "avs-middleware.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Deployer private key (set via --set or values file)
  # DEPLOYER_KEY: ""

  # Etherscan API keys for verification
  # L1_ETHERSCAN_API_KEY: ""
  # L2_ETHERSCAN_API_KEY: ""
