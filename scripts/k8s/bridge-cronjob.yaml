apiVersion: batch/v1
kind: CronJob
metadata:
  name: bridge-sync
  namespace: eigenlayer-bridge
  labels:
    app: eigenlayer-bridge
spec:
  # Run every 6 hours
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: eigenlayer-bridge
        spec:
          restartPolicy: Never
          containers:
            - name: bridge
              image: ghcr.io/ronturetzky/target-contracts/bridge:pr-1
              imagePullPolicy: Always
              env:
                - name: PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bridge-secrets
                      key: PRIVATE_KEY
                - name: L1_RPC_URL
                  valueFrom:
                    configMapKeyRef:
                      name: bridge-config
                      key: L1_RPC_URL
                - name: L2_RPC_URL
                  valueFrom:
                    configMapKeyRef:
                      name: bridge-config
                      key: L2_RPC_URL
                - name: REGISTRY_COORDINATOR_ADDRESS
                  valueFrom:
                    configMapKeyRef:
                      name: bridge-config
                      key: REGISTRY_COORDINATOR_ADDRESS
                # Use SKIP_DEPLOY to reuse existing contracts
                - name: SKIP_DEPLOY
                  value: "true"
                # Mount paths to existing deployment files
                - name: L1_DEPLOY_FILE
                  value: "/config/l1-deploy.json"
                - name: L2_DEPLOY_FILE
                  value: "/config/l2-deploy.json"
                - name: FOUNDRY_DISABLE_NIGHTLY_WARNING
                  value: "1"
              volumeMounts:
                - name: deployment-config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "1"
                limits:
                  memory: "4Gi"
                  cpu: "2"
          volumes:
            - name: deployment-config
              configMap:
                name: bridge-deployments
---
# ConfigMap containing existing deployment addresses
# Create this after initial deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-deployments
  namespace: eigenlayer-bridge
data:
  l1-deploy.json: |
    {
      "middlewareShim": "0x05a2B35dbF33a3B817fAf7e0F9a61A45ef4038E1"
    }
  l2-deploy.json: |
    {
      "registryCoordinatorMimic": "0x9E5178fdD8452142982d40766CdE3597a59fCe98",
      "blsSignatureChecker": "0x879265D7414e15719AAbA513791A3004bAD17650",
      "sp1HeliosMock": "0x9cF895FB8181C8AA95444D9068Af2fe58cDF303F"
    }
