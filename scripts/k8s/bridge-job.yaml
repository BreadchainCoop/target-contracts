apiVersion: v1
kind: Namespace
metadata:
  name: eigenlayer-bridge
---
apiVersion: v1
kind: Secret
metadata:
  name: bridge-secrets
  namespace: eigenlayer-bridge
type: Opaque
stringData:
  # IMPORTANT: Replace with your actual private key
  PRIVATE_KEY: "0xYOUR_PRIVATE_KEY_HERE"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-config
  namespace: eigenlayer-bridge
data:
  # L1 RPC URL (Sepolia, Holesky, or Mainnet)
  L1_RPC_URL: "https://eth-sepolia.g.alchemy.com/v2/YOUR_API_KEY"
  # L2 RPC URL (Gnosis, Arbitrum, etc.)
  L2_RPC_URL: "https://gnosis-mainnet.g.alchemy.com/v2/YOUR_API_KEY"
  # EigenLayer Registry Coordinator address on L1
  REGISTRY_COORDINATOR_ADDRESS: "0x0b6c8481772e8fc6c6c495bc8d6f89d1f5df2c9d"
  # Optional: Slot number for mock proof
  SLOT_NUMBER: "12345"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: bridge-job
  namespace: eigenlayer-bridge
  labels:
    app: eigenlayer-bridge
spec:
  ttlSecondsAfterFinished: 86400  # Clean up after 24 hours
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: eigenlayer-bridge
    spec:
      restartPolicy: Never
      containers:
        - name: bridge
          image: ghcr.io/ronturetzky/target-contracts/bridge:pr-1
          imagePullPolicy: Always
          env:
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: bridge-secrets
                  key: PRIVATE_KEY
            - name: L1_RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: bridge-config
                  key: L1_RPC_URL
            - name: L2_RPC_URL
              valueFrom:
                configMapKeyRef:
                  name: bridge-config
                  key: L2_RPC_URL
            - name: REGISTRY_COORDINATOR_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: bridge-config
                  key: REGISTRY_COORDINATOR_ADDRESS
            - name: SLOT_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: bridge-config
                  key: SLOT_NUMBER
                  optional: true
            - name: FOUNDRY_DISABLE_NIGHTLY_WARNING
              value: "1"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
